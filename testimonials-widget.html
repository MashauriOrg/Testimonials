<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials</title>
  <style>
    /* ── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: transparent;
      color: var(--text, #1a1a2e);
      padding: 16px;
      min-height: 100px;
    }

    /* ── GUIDE PANEL ───────────────────────────────────────── */
    .t-guide {
      background: var(--card-bg, #fff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .t-guide-section { display: flex; flex-direction: column; gap: 10px; }
    .t-guide-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--meta-text, #6b7280);
    }
    .t-guide-divider {
      height: 1px;
      background: var(--border, #e5e7eb);
    }

    /* Tag chips in the guide panel — clickable, larger than card tags */
    .t-guide-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .t-guide-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 999px;
      background: var(--tag-bg, #eff6ff);
      color: var(--tag-text, #2563eb);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }
    .t-guide-chip:hover {
      border-color: var(--accent, #2563eb);
      transform: translateY(-1px);
    }
    .t-guide-chip.active {
      background: var(--accent, #2563eb);
      color: #fff;
      border-color: var(--accent, #2563eb);
    }
    .t-clear-btn {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 999px;
      background: transparent;
      color: var(--meta-text, #6b7280);
      border: 1.5px solid var(--border, #d1d5db);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .t-clear-btn:hover { background: var(--border, #e5e7eb); color: var(--text, #111); }

    /* Embed rules table */
    .t-rules { display: flex; flex-direction: column; gap: 6px; }
    .t-rule {
      display: flex;
      align-items: baseline;
      gap: 12px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .t-rule-label {
      color: var(--meta-text, #6b7280);
      min-width: 110px;
      flex-shrink: 0;
    }
    .t-rule code {
      font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
      font-size: 12px;
      background: var(--code-bg, #f3f4f6);
      color: var(--accent, #2563eb);
      padding: 2px 7px;
      border-radius: 5px;
    }
    .t-rule-note {
      color: var(--meta-text, #9ca3af);
      font-size: 11px;
      font-style: italic;
    }

    /* Add testimonial buttons row */
    .t-guide-actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .t-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      border: none;
    }
    .t-action-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .t-action-btn.primary {
      background: var(--accent, #2563eb);
      color: #fff;
    }
    .t-action-btn.secondary {
      background: var(--card-bg, #fff);
      color: var(--text, #111);
      border: 1.5px solid var(--border, #d1d5db);
    }
    .t-csv-note {
      font-size: 11px;
      color: var(--meta-text, #9ca3af);
      margin-top: 4px;
    }

    /* Results heading */
    .t-results-heading {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--meta-text, #6b7280);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .t-results-count {
      font-weight: 400;
      font-size: 12px;
    }

    /* ── GRID ──────────────────────────────────────────────── */
    .t-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      align-items: start;
    }
    .t-grid.list {
      grid-template-columns: 1fr;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── CARD ──────────────────────────────────────────────── */
    .t-card {
      background: var(--card-bg, #ffffff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .t-card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    /* ── STARS ─────────────────────────────────────────────── */
    .t-stars { display: flex; gap: 3px; }
    .t-star { width: 17px; height: 17px; color: var(--star-color, #f59e0b); flex-shrink: 0; }
    .t-star.empty { color: var(--star-empty, #d1d5db); }

    /* ── QUOTE ─────────────────────────────────────────────── */
    .t-quote-wrap { position: relative; flex: 1; }
    .t-open-quote {
      font-family: Georgia, serif;
      font-size: 52px;
      line-height: 1;
      color: var(--accent, #2563eb);
      opacity: 0.18;
      position: absolute;
      top: -8px;
      left: -4px;
      user-select: none;
      pointer-events: none;
    }
    .t-quote { font-size: 14.5px; line-height: 1.7; color: var(--quote-text, #374151); padding-left: 18px; }

    /* ── DIVIDER ───────────────────────────────────────────── */
    .t-divider { height: 1px; background: var(--border, #e5e7eb); }

    /* ── AUTHOR ────────────────────────────────────────────── */
    .t-author { display: flex; align-items: center; gap: 12px; }
    .t-avatar-wrap {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      overflow: hidden; background: var(--accent, #2563eb);
      display: flex; align-items: center; justify-content: center;
    }
    .t-avatar-wrap img { width: 44px; height: 44px; object-fit: cover; border-radius: 50%; display: block; }
    .t-initials { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
    .t-author-info { flex: 1; min-width: 0; }
    .t-name { font-weight: 700; font-size: 14px; color: var(--text, #111827); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-name a { color: inherit; text-decoration: none; }
    .t-name a:hover { color: var(--accent, #2563eb); text-decoration: underline; }
    .t-role-line { font-size: 12px; color: var(--meta-text, #6b7280); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    /* ── CARD FOOTER ───────────────────────────────────────── */
    .t-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    .t-date { font-size: 11px; color: var(--meta-text, #9ca3af); flex-shrink: 0; }
    .t-tags { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; }
    .t-tag { font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 999px; background: var(--tag-bg, #eff6ff); color: var(--tag-text, #2563eb); letter-spacing: 0.2px; }

    /* ── STATUS MESSAGES ───────────────────────────────────── */
    .t-status { text-align: center; padding: 48px 20px; color: var(--meta-text, #9ca3af); font-size: 14px; }
    .t-status.error { color: #dc2626; }
    .t-status.loading::after {
      content: '';
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--accent, #2563eb);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DARK THEME ────────────────────────────────────────── */
    [data-theme="dark"] body {
      --text: #f1f5f9; --card-bg: #1e293b; --border: #334155;
      --quote-text: #cbd5e1; --meta-text: #94a3b8; --code-bg: #0f172a;
    }
  </style>
</head>
<body>
  <div id="app"><p class="t-status loading">Loading testimonials</p></div>
  <!-- Hidden file input for CSV import -->
  <input type="file" id="csv-input" accept=".csv,text/csv" style="display:none" />

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION  —  edit the values in this block
   ═══════════════════════════════════════════════════════════════ */
const CONFIG = {

  // ── Primary data source (your Senja export sheet) ──────────
  sheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRlWI-IfT3SQO7eIUa5VVMYLVcGHaa6iB-S-4kGvWUjCtjXZzTT6lK0yJKTThwa1mg_koXSS7Ho2fOk/pub?output=csv',

  // ── Additional CSV sources (e.g. Google Form responses) ────
  // Each URL must be a published Google Sheet CSV (or any public CSV).
  // Add as many as you need — results are merged automatically.
  additionalSheetUrls: [
    // 'https://docs.google.com/spreadsheets/d/.../pub?output=csv',
  ],

  // ── Google Form URL for submitting new testimonials ────────
  // Paste your Google Form share link here to show a Submit button.
  // Leave empty ('') to hide the button.
  googleFormUrl: '',

  // ── Brand accent colour ────────────────────────────────────
  accentColor: '#2563eb',

  // ── Default layout: 'grid' or 'list' ──────────────────────
  defaultLayout: 'grid',

};
/* ═══════════════════════════════════════════════════════════════ */


/* ── URL PARAMETERS ─────────────────────────────────────────────
   Control each embed via query string, e.g.:
     ?tags=USSAVI&limit=3&shuffle=true&theme=dark&layout=list
   ──────────────────────────────────────────────────────────────── */
const p          = new URLSearchParams(window.location.search);
const urlTags    = (p.get('tags') || '').split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
const layout     = p.get('layout')     || CONFIG.defaultLayout;
const limit      = parseInt(p.get('limit'))      || 0;
const minRating  = parseInt(p.get('min_rating')) || 1;
const shuffle    = p.get('shuffle') === 'true';
const theme      = p.get('theme')   || 'light';
const showGuide  = urlTags.length === 0; // guide panel only shows when no tag filter in URL

// Apply theme + accent colour
if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
const rs = document.documentElement.style;
rs.setProperty('--accent',   CONFIG.accentColor);
rs.setProperty('--tag-bg',   CONFIG.accentColor + '1a');
rs.setProperty('--tag-text', CONFIG.accentColor);

// Active in-page filter (separate from URL tags — used by guide panel chips)
let activeChipTag = null;


/* ── CSV PARSER ─────────────────────────────────────────────────  */
function parseCSV(raw) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i], nx = raw[i + 1];
    if (inQ) {
      if      (c === '"' && nx === '"') { field += '"'; i++; }
      else if (c === '"')               { inQ = false; }
      else                              { field += c; }
    } else {
      if      (c === '"')  { inQ = true; }
      else if (c === ',')  { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); field = ''; rows.push(row); row = []; }
      else if (c !== '\r') { field += c; }
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(f => f.trim() !== ''));
}


/* ── COLUMN MAPPER ──────────────────────────────────────────────
   Auto-detects Senja export format vs. simple format by header row.
   Senja: customer_name, text, customer_tagline, customer_company …
   Simple: name, quote, role, institution …
   ──────────────────────────────────────────────────────────────── */
function mapRows(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const col = k => headers.indexOf(k);

  // Detect format
  const isSenja = headers.includes('customer_name');

  const C = isSenja ? {
    name:        col('customer_name'),
    role:        col('customer_tagline'),
    institution: col('customer_company'),
    quote:       col('text'),
    photo:       col('customer_avatar'),
    rating:      col('rating'),
    date:        col('date'),
    email:       col('customer_email'),
    website:     col('customer_url'),
    tags:        col('tags'),
  } : {
    name:        col('name'),
    role:        col('role'),
    institution: col('institution'),
    quote:       col('quote'),
    photo:       col('photo'),
    rating:      col('rating'),
    date:        col('date'),
    email:       col('email'),
    website:     col('website'),
    tags:        col('tags'),
  };

  return rows.slice(1).map(r => ({
    name:        (r[C.name]        || '').trim(),
    role:        (r[C.role]        || '').trim(),
    institution: (r[C.institution] || '').trim(),
    quote:       (r[C.quote]       || '').trim(),
    photo:       (r[C.photo]       || '').trim(),
    rating:      parseFloat(r[C.rating]) || 0,
    date:        (r[C.date]        || '').trim(),
    email:       (r[C.email]       || '').trim(),
    website:     (r[C.website]     || '').trim(),
    tags:        (r[C.tags]        || '').split(',').map(t => t.trim()).filter(Boolean),
  })).filter(t => t.quote);
}


/* ── FETCH HELPERS ──────────────────────────────────────────────  */
async function fetchCSV(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${url}`);
  return mapRows(parseCSV(await res.text()));
}

async function fetchAll() {
  const urls = [CONFIG.sheetUrl, ...(CONFIG.additionalSheetUrls || [])].filter(
    u => u && !u.includes('YOUR_PUBLISHED')
  );
  if (!urls.length) throw new Error('No sheet URL configured.');
  const results = await Promise.all(urls.map(fetchCSV));
  // Merge and deduplicate by quote text
  const seen = new Set();
  return results.flat().filter(t => {
    if (seen.has(t.quote)) return false;
    seen.add(t.quote);
    return true;
  });
}


/* ── RENDER HELPERS ─────────────────────────────────────────────  */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function starSVG(filled) {
  return `<svg class="t-star${filled ? '' : ' empty'}" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969
    0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755
    1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539
    -1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461
    a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
}

function renderStars(n) {
  const full = Math.round(Math.min(5, Math.max(0, n)));
  return Array.from({length: 5}, (_, i) => starSVG(i < full)).join('');
}

function initials(name) {
  return name.trim().split(/\s+/).slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || '?';
}

function renderAvatar(t) {
  if (t.photo) {
    const ini = initials(t.name);
    return `<div class="t-avatar-wrap"><img src="${esc(t.photo)}" alt="${esc(t.name)}"
      onerror="this.parentElement.innerHTML='<span class=\\'t-initials\\'>${ini}</span>'" /></div>`;
  }
  return `<div class="t-avatar-wrap"><span class="t-initials">${initials(t.name)}</span></div>`;
}

function formatDate(d) {
  if (!d) return '';
  const datePart = d.replace(/\s+\d{2}:\d{2}:\d{2}.*$/, '').trim();
  const parsed = new Date(datePart);
  if (isNaN(parsed.getTime())) return d;
  return parsed.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
}

function tagToUrlParam(tag) {
  return encodeURIComponent(tag).replace(/%20/g, '+');
}

function renderCard(t) {
  const roleLine  = [t.role, t.institution].filter(Boolean).join(' · ');
  const nameInner = t.website
    ? `<a href="${esc(t.website)}" target="_blank" rel="noopener noreferrer">${esc(t.name)}</a>`
    : esc(t.name);
  const starsHtml  = t.rating >= 1
    ? `<div class="t-stars" aria-label="${t.rating} out of 5 stars">${renderStars(t.rating)}</div>` : '';
  const footerDate = formatDate(t.date);
  const tagsHtml   = t.tags.map(tag => `<span class="t-tag">${esc(tag)}</span>`).join('');
  return `
<article class="t-card">
  ${starsHtml}
  <div class="t-quote-wrap">
    <span class="t-open-quote" aria-hidden="true">"</span>
    <p class="t-quote">${esc(t.quote)}</p>
  </div>
  <div class="t-divider"></div>
  <div class="t-author">
    ${renderAvatar(t)}
    <div class="t-author-info">
      <div class="t-name">${nameInner}</div>
      ${roleLine ? `<div class="t-role-line">${esc(roleLine)}</div>` : ''}
    </div>
  </div>
  ${(footerDate || t.tags.length) ? `
  <div class="t-footer">
    <span class="t-date">${esc(footerDate)}</span>
    <div class="t-tags">${tagsHtml}</div>
  </div>` : ''}
</article>`;
}


/* ── GUIDE PANEL ────────────────────────────────────────────────
   Shown only when no ?tags= filter is in the URL.
   Displays all tags as clickable filter chips, embed rules, and
   buttons to submit via Google Form or import a CSV.
   ──────────────────────────────────────────────────────────────── */
function renderGuidePanel(allTags) {
  const chipHtml = allTags.map(tag => {
    const isActive = activeChipTag === tag;
    return `<button class="t-guide-chip${isActive ? ' active' : ''}"
      onclick="filterByChip(${JSON.stringify(tag)})">${esc(tag)}</button>`;
  }).join('');

  const clearBtn = activeChipTag
    ? `<button class="t-clear-btn" onclick="filterByChip(null)">✕ Clear filter</button>`
    : '';

  const formBtn = CONFIG.googleFormUrl
    ? `<a href="${esc(CONFIG.googleFormUrl)}" target="_blank" rel="noopener" class="t-action-btn primary">
        📝 Submit a testimonial
      </a>`
    : '';

  const baseUrl = window.location.href.split('?')[0];

  return `
<div class="t-guide">

  <div class="t-guide-section">
    <div class="t-guide-title">Tags in this collection</div>
    <div class="t-guide-tags">
      ${chipHtml}
      ${clearBtn}
    </div>
  </div>

  <div class="t-guide-divider"></div>

  <div class="t-guide-section">
    <div class="t-guide-title">How to embed on a page</div>
    <div class="t-rules">
      <div class="t-rule">
        <span class="t-rule-label">Single tag:</span>
        <code>?tags=USSAVI</code>
      </div>
      <div class="t-rule">
        <span class="t-rule-label">Space in name:</span>
        <code>?tags=CRG+BBS</code>
        <span class="t-rule-note">spaces become +</span>
      </div>
      <div class="t-rule">
        <span class="t-rule-label">Multiple tags:</span>
        <code>?tags=USSAVI,CRG+BBS</code>
        <span class="t-rule-note">comma-separated, shows any match</span>
      </div>
      <div class="t-rule">
        <span class="t-rule-label">No filter:</span>
        <code>?tags=</code>
        <span class="t-rule-note">omit entirely to show all</span>
      </div>
      <div class="t-rule">
        <span class="t-rule-label">Extras:</span>
        <code>&amp;shuffle=true</code> &nbsp; <code>&amp;limit=6</code> &nbsp; <code>&amp;layout=list</code>
      </div>
    </div>
    <div class="t-rules" style="margin-top:8px">
      <div class="t-rule">
        <span class="t-rule-label">Example:</span>
        <code>&lt;iframe src="${esc(baseUrl)}?tags=USSAVI" width="100%" height="600" frameborder="0"&gt;&lt;/iframe&gt;</code>
      </div>
    </div>
  </div>

  <div class="t-guide-divider"></div>

  <div class="t-guide-section">
    <div class="t-guide-title">Add testimonials</div>
    <div class="t-guide-actions">
      ${formBtn}
      <button class="t-action-btn secondary" onclick="document.getElementById('csv-input').click()">
        📂 Import CSV
      </button>
    </div>
    <p class="t-csv-note">
      CSV import merges testimonials into this view for the current session.
      Use columns: <code>name, role, institution, quote, photo, rating, date, email, website, tags</code>
    </p>
  </div>

</div>`;
}


/* ── GRID RENDERER ──────────────────────────────────────────────  */
let _allItems = [];  // in-memory store for re-filtering

function renderGrid(items) {
  const grid = document.getElementById('t-grid-area');
  const heading = document.getElementById('t-results-heading');
  if (!grid) return;

  // Apply URL-level filters (already baked in from init) — or chip filter
  let filtered = items;
  if (activeChipTag) {
    filtered = items.filter(t => t.tags.map(x => x.toLowerCase()).includes(activeChipTag.toLowerCase()));
  }
  if (minRating > 1) filtered = filtered.filter(t => t.rating >= minRating);
  let displayed = [...filtered];
  if (shuffle) {
    for (let i = displayed.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [displayed[i], displayed[j]] = [displayed[j], displayed[i]];
    }
  }
  if (limit > 0) displayed = displayed.slice(0, limit);

  if (heading) {
    const label = activeChipTag ? `"${activeChipTag}"` : 'All testimonials';
    heading.innerHTML = `<span>${label}</span><span class="t-results-count">${displayed.length} testimonial${displayed.length !== 1 ? 's' : ''}</span>`;
  }

  if (!displayed.length) {
    grid.innerHTML = `<p class="t-status">No testimonials found${activeChipTag ? ` for "${activeChipTag}"` : ''}.</p>`;
  } else {
    const listClass = layout === 'list' ? ' list' : '';
    grid.innerHTML = `<div class="t-grid${listClass}">${displayed.map(renderCard).join('\n')}</div>`;
  }

  // Notify parent of new height
  try { window.parent.postMessage({ type: 'testimonials-height', height: document.body.scrollHeight }, '*'); } catch(_) {}
}

function filterByChip(tag) {
  activeChipTag = tag;
  // Re-render the guide panel chips to update active state
  const guide = document.getElementById('t-guide-area');
  if (guide) {
    const allTags = [...new Set(_allItems.flatMap(t => t.tags))].sort((a, b) => a.localeCompare(b));
    guide.innerHTML = renderGuidePanel(allTags);
  }
  renderGrid(_allItems);
}


/* ── CSV FILE IMPORT ────────────────────────────────────────────  */
document.getElementById('csv-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = mapRows(parseCSV(ev.target.result));
      if (!imported.length) { alert('No testimonials found in that CSV — check the column headers.'); return; }
      // Merge, deduplicating by quote text
      const existing = new Set(_allItems.map(t => t.quote));
      const newOnes  = imported.filter(t => !existing.has(t.quote));
      _allItems = [..._allItems, ...newOnes];
      // Refresh tag chips
      const allTags = [...new Set(_allItems.flatMap(t => t.tags))].sort((a, b) => a.localeCompare(b));
      const guide = document.getElementById('t-guide-area');
      if (guide) guide.innerHTML = renderGuidePanel(allTags);
      renderGrid(_allItems);
      alert(`✓ Imported ${newOnes.length} new testimonial${newOnes.length !== 1 ? 's' : ''} (${imported.length - newOnes.length} duplicates skipped).`);
    } catch(err) {
      alert('Could not parse CSV: ' + err.message);
    }
    e.target.value = ''; // reset so same file can be re-imported
  };
  reader.readAsText(file);
});


/* ── MAIN ───────────────────────────────────────────────────────── */
async function init() {
  const app = document.getElementById('app');

  try {
    let allItems = await fetchAll();

    // Apply URL tag filter (for embedded iframes with ?tags=)
    if (urlTags.length) {
      allItems = allItems.filter(t =>
        t.tags.some(tag => urlTags.includes(tag.toLowerCase()))
      );
    }

    _allItems = allItems;

    if (showGuide) {
      // Admin / reference view — show guide panel + all testimonials
      const allTags = [...new Set(allItems.flatMap(t => t.tags))].sort((a, b) => a.localeCompare(b));
      app.innerHTML = `
        <div id="t-guide-area">${renderGuidePanel(allTags)}</div>
        <div class="t-results-heading" id="t-results-heading"></div>
        <div id="t-grid-area"></div>`;
    } else {
      // Embedded view — no guide panel, just the grid
      app.innerHTML = `<div id="t-grid-area"></div>`;
    }

    renderGrid(allItems);

  } catch (err) {
    app.innerHTML = `<p class="t-status error">
      Could not load testimonials. Make sure your sheet is published publicly
      (File → Share → Publish to web → CSV).<br>
      <small style="opacity:0.7">${esc(err.message)}</small>
    </p>`;
  }
}

init();
</script>
